    <path d="M40 10 Q35 35 42 65" stroke="url(#clawGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="800" fill="#ffffff">
