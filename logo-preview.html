<!DOCTYPE html>
<html>
<head><title>LeadClaw Logo Preview</title></head>
<body style="background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:40px;">
  
  <!-- Dark background version -->
  <div style="padding:30px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
      <defs>
        <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#e74c3c"/>
          <stop offset="100%" style="stop-color:#c0392b"/>
        </linearGradient>
      </defs>
      <g transform="translate(15, 12)">
        <path d="M10 10 Q15 35 8 65" stroke="url(#clawGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M25 5 Q28 35 25 70" stroke="url(#clawGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M40 10 Q35 35 42 65" stroke="url(#clawGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
      </g>
      <text x="80" y="58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="800" fill="#ffffff">Lead<tspan fill="#e74c3c">Claw</tspan></text>
      <text x="82" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#888888" letter-spacing="2">AI-POWERED LEAD GENERATION</text>
    </svg>
  </div>

  <!-- Icon only version -->
  <div style="padding:30px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
      <defs>
        <linearGradient id="clawGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#e74c3c"/>
          <stop offset="100%" style="stop-color:#c0392b"/>
        </linearGradient>
      </defs>
      <rect width="80" height="80" rx="16" fill="#1a1a2e"/>
      <g transform="translate(18, 10)">
        <path d="M8 8 Q14 30 6 55" stroke="url(#clawGrad2)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M22 3 Q25 30 22 60" stroke="url(#clawGrad2)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M36 8 Q30 30 38 55" stroke="url(#clawGrad2)" stroke-width="7" fill="none" stroke-linecap="round"/>
      </g>
    </svg>
  </div>

  <p style="color:#555;font-family:sans-serif;">Dark BG | Full logo + Icon mark</p>
</body>
</html>
